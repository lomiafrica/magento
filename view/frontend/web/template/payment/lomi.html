<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>
        <label class="label" data-bind="attr: {'for': getCode()}">
            <!-- ko if: usesBrandingCard() -->
            <div class="wc-lomi-checkout-branding">
                <div class="wc-lomi-checkout-branding__main">
                    <div class="wc-lomi-checkout-branding__brand">
                        <!-- ko if: payWithImageUrl() -->
                        <img class="wc-lomi-pay-with-image"
                             data-bind="attr: {src: payWithImageUrl(), alt: $t('Pay with lomi.')}"
                             loading="lazy"
                             decoding="async" />
                        <!-- /ko -->
                        <!-- ko ifnot: payWithImageUrl() -->
                        <p class="wc-lomi-checkout-branding__title">
                            <span data-bind="i18n: 'Pay with'"></span>
                            <strong>lomi.</strong>
                        </p>
                        <!-- /ko -->
                    </div>
                    <!-- ko if: paymentIconUrls().length -->
                    <div class="wc-lomi-checkout-branding__methods" aria-hidden="true" data-bind="foreach: paymentIconUrls()">
                        <div data-bind="css: $parent.getPaymentIconClass($data)">
                            <img data-bind="attr: {src: $data}" alt="" loading="lazy" decoding="async" />
                        </div>
                    </div>
                    <!-- /ko -->
                </div>
                <p class="wc-lomi-checkout-branding__hint">
                    <span class="wc-lomi-checkout-branding__hint-icon" aria-hidden="true"></span>
                    <span data-bind="i18n: 'Secure hosted checkout on lomi.'"></span>
                </p>
            </div>
            <!-- /ko -->
            <!-- ko ifnot: usesBrandingCard() -->
            <span data-bind="text: getTitle()"></span>
            <!-- /ko -->
        </label>
    </div>

    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>

        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="submit"
                        data-bind="
                        click: placeOrder,
                        attr: {title: $t('Place Order')},
                        css: {disabled: !isPlaceOrderActionAllowed()},
                        enable: (getCode() == isChecked())
                        "
                        disabled>
                    <span data-bind="i18n: 'Place Order'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
